<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Dashboard | McOKOTH TECHNOLOGIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark-blue: #0a192f; }
        body { font-family: 'Inter', sans-serif; }
        .bg-dark-blue { background-color: var(--dark-blue); }
        .text-dark-blue { color: var(--dark-blue); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="sticky top-0 z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='/'">
                    <span class="text-xl md:text-2xl font-bold text-dark-blue tracking-tighter">McOKOTH<span class="text-blue-600">TECHNOLOGIES</span></span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-dark-blue hover:text-blue-600 font-medium transition">Home</a>
                    <button onclick="logout()" class="text-red-600 font-medium hover:underline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-12">
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 mb-8">
            <h1 class="text-3xl font-bold text-dark-blue mb-2">Standard Plan Dashboard</h1>
            <p class="text-gray-600">Welcome to your personal hosting space. You are on the <span class="font-bold text-blue-600">Standard Plan</span>.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h3 class="font-bold text-xl mb-4"><i class="fas fa-server text-blue-600 mr-2"></i>Server Status</h3>
                <div class="p-4 bg-green-50 text-green-700 rounded-lg border border-green-200">
                    <i class="fas fa-check-circle mr-2"></i> Online - 99.9% Uptime
                </div>
                <div class="mt-4 text-sm text-gray-500">
                    <p>Storage Used: 1.2GB / 5GB</p>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 mt-1">
                        <div class="bg-blue-600 h-2.5 rounded-full" style="width: 24%"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h3 class="font-bold text-xl mb-4"><i class="fas fa-globe text-indigo-600 mr-2"></i>My Website</h3>
                <p class="text-gray-600 mb-4">Manage your personal website deployment.</p>
                <button class="bg-dark-blue text-white px-4 py-2 rounded-lg hover:bg-blue-900 transition">Manage Files</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', checkSession);
        async function checkSession() {
            const res = await fetch('/api/check-session');
            const data = await res.json();
            if (!data.loggedIn) {
                window.location.href = '/hosting';
            }
        }
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/hosting';
        }
    </script>
</body>
</html>
