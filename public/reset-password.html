<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | McOKOTH TECHNOLOGIES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Set New Password</h1>
            <p class="text-gray-500 text-sm mt-2">Enter your new password below.</p>
        </div>

        <form onsubmit="handleReset(event)">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">New Password</label>
                <input type="password" id="new-password" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" required minlength="6">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Confirm Password</label>
                <input type="password" id="confirm-password" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Update Password</button>
        </form>
        
        <div id="message" class="mt-4 text-center text-sm hidden"></div>
        
        <div class="mt-6 text-center">
            <a href="/" class="text-blue-600 hover:underline text-sm">Back to Home</a>
        </div>
    </div>

    <script>
        async function handleReset(e) {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');
            const msgDiv = document.getElementById('message');

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (password !== confirm) {
                showMessage('Passwords do not match', 'red');
                return;
            }

            if (!token) {
                showMessage('Invalid reset link.', 'red');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Updating...';

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage(data.message, 'green');
                    setTimeout(() => window.location.href = '/', 3000);
                } else {
                    showMessage(data.message, 'red');
                    btn.disabled = false;
                    btn.innerText = 'Update Password';
                }
            } catch (err) {
                showMessage('Server error occurred.', 'red');
            }
        }

        function showMessage(text, color) {
            const div = document.getElementById('message');
            div.innerText = text;
            div.className = `mt-4 text-center text-sm font-bold text-${color}-600`;
            div.classList.remove('hidden');
        }
    </script>
</body>
</html>
